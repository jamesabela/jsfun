*{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg-gradient);color:var(--text-main);font-family:Inter,system-ui,-apple-system,sans-serif;min-height:100vh;padding:24px;display:flex;justify-content:center;align-items:flex-start}.container{width:100%;max-width:760px;display:flex;flex-direction:column;gap:20px}header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border-color);padding-bottom:12px}.title-group h1{font-family:Outfit,sans-serif;font-weight:800;font-size:1.65rem;letter-spacing:-.02em;background:linear-gradient(to right,var(--text-main),var(--accent-gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}.title-group p{font-size:.9rem;color:var(--text-muted)}.breadcrumb{display:inline-block;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:999px;padding:6px 10px;font-size:.8rem;font-weight:700}.card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:22px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px}.card-title{font-family:Outfit,sans-serif;font-size:1.08rem;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--accent-gold);text-transform:uppercase}.instruction-text, li{font-size:.95rem;line-height:1.55;color:var(--text-main)}ul,ol{padding-left:20px}.banner{background:rgba(59,130,246,.09);border-left:4px solid var(--accent-blue);padding:12px 16px;border-radius:8px;font-size:.92rem;line-height:1.45}pre{background:var(--code-bg);color:var(--code-text);padding:14px;border-radius:8px;font-family:'Fira Code',Consolas,monospace;font-size:.84rem;overflow-x:auto;border:1px solid rgba(255,255,255,.06)}code{font-family:'Fira Code',Consolas,monospace;background:#eef2ff;border-radius:4px;padding:1px 5px}.links{display:flex;flex-wrap:wrap;gap:8px}.links a,.button{display:inline-block;text-decoration:none;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4e </style></head><body><div class="container"><header><div class="title-group"><p>Reference</p><h1>Binary Trees Vocabulary</h1></div></header><div class="card"><div class="card-title">Interactive glossary</div><p class="instruction-text">Click each term to reveal a short A-level friendly definition.</p>
<div id="terms"></div></div></div><script>
const terms = [
 ['Binary tree','A data structure where each node can have up to two children, normally called left and right.'],
 ['Root','The first node in a tree. Searching and insertion normally begin at the root.'],
 ['Node','One item in the tree. It normally stores data and links or pointers to child nodes.'],
 ['Left subtree','The part of the tree reached by following the left link from a node. In a binary search tree, smaller values usually go here.'],
 ['Right subtree','The part of the tree reached by following the right link from a node. In a binary search tree, larger values usually go here.'],
 ['Leaf','A node with no children.'],
 ['Parent','A node that has a child node below it.'],
 ['Child','A node below another node.'],
 ['Pointer','A stored reference to another node or a stored index in an array/list implementation.'],
 ['Null pointer','A pointer value showing that there is no child. In Python this is often None or -1 in list-based exam code.'],
 ['Binary search tree','A binary tree where values are arranged so smaller values go left and larger values go right.'],
 ['Traversal','Visiting all nodes in a controlled order, such as in-order, pre-order or post-order.'],
 ['In-order traversal','Visit left subtree, then current node, then right subtree. In a binary search tree this gives sorted order.'],
 ['Pre-order traversal','Visit current node, then left subtree, then right subtree.'],
 ['Post-order traversal','Visit left subtree, then right subtree, then current node.'],
 ['Recursion','A method where a function calls itself on a smaller version of the problem.'],
 ['Base case','The stopping condition in a recursive algorithm.'],
 ['General case','The part of the recursive algorithm that reduces the problem and calls itself again.'],
 ['List-based tree','A binary tree stored using lists or arrays, often with columns for data, left pointer and right pointer.'],
 ['OOP tree','A binary tree stored using Node objects, where each object stores data, left and right references.']
];
const box=document.getElementById('terms'); terms.forEach(([t,d])=>{const details=document.createElement('details'); details.className='card'; details.style.marginBottom='8px'; details.innerHTML='<summary><strong>'+t+'</strong></summary><p class="instruction-text">'+d+'</p>'; box.appendChild(details);});
</script><script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
