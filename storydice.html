<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Dice - Simple Universal Vocabulary</title>
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #ff4081, #7b1fa2);
      --glass-bg: rgba(255, 255, 255, 0.2);
    }
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(45deg, #fce4ec, #f3e5f5);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #9c27b0; text-shadow: 2px 2px white; font-size: 3rem; margin-bottom: 0.5rem; }
    .controls {
      background: var(--glass-bg); backdrop-filter: blur(10px); padding: 20px;
      border-radius: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      border: 2px solid white; margin-bottom: 30px; display: flex;
      gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center;
    }
    .mode-selection label { cursor: pointer; margin: 0 5px; }
    .mode-selection input { display: none; }
    .mode-selection input:checked + span { background: #ff4081; color: white; padding: 8px 15px; border-radius: 20px; }
    .mode-selection span { padding: 8px 15px; border-radius: 20px; transition: 0.2s; }
    button { padding: 12px 25px; font-size: 1.2rem; border: none; border-radius: 25px; background: var(--primary-gradient); color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    button.secondary { background: white; color: #7b1fa2; border: 2px solid #7b1fa2; }
    
    .dice-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 1000px; padding: 20px; flex-grow: 1; }
    .dice-container.grid-9 { display: grid; grid-template-columns: repeat(3, 100px); gap: 30px; width: fit-content; margin: 0 auto; }
    
    /* 
      ULTIMATE SAFARI FIX: Completely removed transform-style: preserve-3d and true 3D cubes.
      Using a 2D tile tumble to prevent ALL polygon tearing and pink flashing artifacts.
    */
    .dice-scene { width: 100px; height: 100px; perspective: 800px; position: relative; }
    .dice { width: 100%; height: 100%; position: relative; cursor: pointer; }
    
    .dice-face { width: 100%; height: 100%; display:flex; align-items:center; justify-content:center; font-size:60px; box-sizing: border-box; background: #fff; border: 4px solid #ff4081; border-radius: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
    
    .rolling { pointer-events: none; }
    
    .net-layout-container {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(4, 100px);
        gap: 15px;
        width: fit-content;
        margin: 0 auto;
        justify-content: center;
    }
    .empty-slot { visibility:hidden; width: 100px; height: 100px; }

    .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:1000; justify-content:center; align-items:center; }
    .frayer-modal { background:white; width:90%; max-width:850px; border-radius:24px; padding:30px; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:20px; position:relative; }
    .frayer-quadrant { background:#fdf2f8; border:3px dashed #ff4081; border-radius:16px; padding:20px; display:flex; flex-direction:column; align-items:center; text-align:center; }
    .frayer-quadrant h3 { margin:0 0 10px 0; font-size:18px; color:#9d174d; border-bottom:2px solid #fbcfe8; width:100%; padding-bottom:5px; }
    .frayer-quadrant p { font-size:16px; line-height:1.5; color:#3f3f46; margin:0; }
    .frayer-center { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:170px; height:170px; background:white; border:6px solid #ff4081; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
    #frayerEmoji { font-size:60px; line-height:1; }
    #frayerWord { font-size:22px; font-weight:bold; color:#7b1fa2; margin-top:5px; text-transform:uppercase; }
    .close-modal { position:absolute; top:-15px; right:-15px; width:45px; height:45px; background:#f50057; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; }
    
    footer { text-align:center; padding:2rem 1rem; border-top:1px solid #ffc1e3; font-size:0.95rem; color:#7b1fa2; width:100%; max-width:960px; margin-top:40px; }
    footer a { color:#ff4081; font-weight:600; text-decoration:none; }
    footer a.tea { color:#e73c7e; }
  </style>
</head>
<body>
<h1>🎲 Story Dice 🎲</h1>
<p>Click a die to see its Frayer Model vocabulary!</p>
<div class="controls">
  <div class="mode-selection">
    <label><input type="radio" name="diceMode" value="5" onchange="rollDice()" checked><span>5 Dice</span></label>
    <label><input type="radio" name="diceMode" value="9" onchange="rollDice()"><span>9 Dice</span></label>
    <label><input type="radio" name="diceMode" value="net" onchange="rollDice()"><span>Dice Net</span></label>
  </div>
  <button onclick="rollDice()">🎲 Roll Again! 🎲</button>
  <button class="secondary" onclick="saveImage()">💾 Save Image</button>
</div>
<div id="diceContainer" class="dice-container"></div>

<div id="modalOverlay" class="modal-overlay">
  <div class="frayer-modal">
    <div class="close-modal" onclick="closeFrayer()">&times;</div>
    <div class="frayer-center"><div id="frayerEmoji"></div><div id="frayerWord"></div></div>
    <div class="frayer-quadrant" id="q-definition"><h3>Definition</h3><p></p></div>
    <div class="frayer-quadrant" id="q-characteristics"><h3>Characteristics</h3><p></p></div>
    <div class="frayer-quadrant" id="q-examples"><h3>Examples</h3><p></p></div>
    <div class="frayer-quadrant" id="q-nonexamples"><h3>Non-Examples</h3><p></p></div>
  </div>
</div>

  function getFrayerData(symbol) { return frayerData[symbol] || { word: "Object", def: "A story element.", char: "Used in your story.", ex: "Found on this die.", non: "Something else." }; }
  
  async function rollDice() {
    const mode = document.querySelector('input[name="diceMode"]:checked').value;
    const diceContainer = document.getElementById("diceContainer");
    diceContainer.innerHTML = ""; diceContainer.classList.remove("grid-9");
    let generatedDice = [];
    
    // Choose our final symbols
    const selectedSymbols = shuffleAndSlice(mode === "net" ? 6 : parseInt(mode));
    
    if (mode === "net") {
        diceContainer.innerHTML = `<div class="net-layout-container">
            <div class="empty-slot"></div><div id="net-0"></div><div class="empty-slot"></div>
            <div id="net-1"></div><div id="net-2"></div><div id="net-3"></div>
            <div class="empty-slot"></div><div id="net-4"></div><div class="empty-slot"></div>
            <div class="empty-slot"></div><div id="net-5"></div><div class="empty-slot"></div>
        </div>`;
        for (let i = 0; i < 6; i++) {
            generatedDice.push({el: createDiceTile(document.getElementById(`net-${i}`)), final: selectedSymbols[i]});
        }
    } else {
        if (mode === "9") diceContainer.classList.add("grid-9");
        for (let i = 0; i < parseInt(mode); i++) {
            generatedDice.push({el: createDiceTile(diceContainer), final: selectedSymbols[i]});
        }
    }
    
    // Trigger animation
    setTimeout(() => {
        generatedDice.forEach(d => applyDiceRoll(d.el, d.final));
    }, 50);
    
    await new Promise(r => setTimeout(r, 1500));
    updateURL(mode === "net" ? "net" : "dice", selectedSymbols);
  }

  function createDiceTile(container) {
    const scene = document.createElement("div"); scene.className = "dice-scene";
    const dice = document.createElement("div"); dice.className = "dice";
    
    const face = document.createElement("div"); face.className = "dice-face";
    face.textContent = "🎲"; // Initial placeholder until JS scrambles it
    dice.appendChild(face);
    
    dice.onclick = () => openFrayer(face.textContent);
    
    scene.appendChild(dice); container.appendChild(scene); 
    return dice;
  }

  function applyDiceRoll(diceElement, finalSymbol) {
    const face = diceElement.querySelector('.dice-face');
    diceElement.classList.add('rolling');
    
    let rolls = 0;
    // Fast scrambling of Emojis to simulate rolling chaos
    const interval = setInterval(() => {
        face.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        rolls++;
        if(rolls > 12) {
            clearInterval(interval);
            face.textContent = finalSymbol;
        }
    }, 80);
    
    setTimeout(() => {
        diceElement.classList.remove('rolling');
    }, 1200);
  }

  function openFrayer(symbol) {
    if (symbol === "🎲") return; // Skip if clicked mid-roll on placeholder
    const data = getFrayerData(symbol);
    document.getElementById("frayerEmoji").textContent = symbol;
    document.getElementById("frayerWord").textContent = data.word;
    document.querySelector("#q-definition p").textContent = data.def;
    document.querySelector("#q-characteristics p").textContent = data.char;
    document.querySelector("#q-examples p").textContent = data.ex;
    document.querySelector("#q-nonexamples p").textContent = data.non;
    document.getElementById("modalOverlay").style.display = 'flex';
  }

  function closeFrayer() { document.getElementById("modalOverlay").style.display = 'none'; }
  
  function displayDice(mode, diceArray) {
    const diceContainer = document.getElementById("diceContainer");
    diceContainer.innerHTML = ""; diceContainer.classList.remove("grid-9");
    if (mode === "net") {
        diceContainer.innerHTML = `<div class="net-layout-container">
            <div class="empty-slot"></div><div id="net-0"></div><div class="empty-slot"></div>
            <div id="net-1"></div><div id="net-2"></div><div id="net-3"></div>
            <div class="empty-slot"></div><div id="net-4"></div><div class="empty-slot"></div>
            <div class="empty-slot"></div><div id="net-5"></div><div class="empty-slot"></div>
        </div>`;
        diceArray.forEach((sym, i) => {
            const dice = createDiceTile(document.getElementById(`net-${i}`));
            dice.querySelector('.dice-face').textContent = sym;
        });
    } else {
        if (mode === "9") diceContainer.classList.add("grid-9");
        diceArray.forEach(symbol => {
            const dice = createDiceTile(diceContainer);
            dice.querySelector('.dice-face').textContent = symbol;
        });
    }
  }

  function updateURL(param, array) {
    const url = new URL(window.location); url.searchParams.delete("dice"); url.searchParams.delete("net");
    url.searchParams.set(param, array.join("-")); window.history.pushState({}, "", url);
  }

  function shuffleAndSlice(n) { return [...symbols].sort(() => Math.random() - 0.5).slice(0, n); }

  function saveImage() {
    html2canvas(document.getElementById("diceContainer"), { useCORS: true, backgroundColor: null }).then(canvas => {
      const link = document.createElement("a"); link.download = "story_dice.png";
      link.href = canvas.toDataURL(); link.click();
    });
  }

  window.onload = function() {
    const p = new URLSearchParams(window.location.search), d = p.get("dice"), n = p.get("net");
    if (n) { document.querySelector('input[value="net"]').checked = true; displayDice("net", n.split("-"));
    } else if (d) { const array = d.split("-"); if (array.length === 9) document.querySelector('input[value="9"]').checked = true; displayDice(array.length === 9 ? "9" : "5", array);
    } else { rollDice(); }
  };
