<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Computing Tools — jsfun by James Abela</title>
  <meta name="description" content="A collection of free classroom tools for computing by James Abela.">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6aff;
      --primary-dark: #0047cc;
      --primary-light: #e6f0ff;
      --text: #0d1b3e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --white: #ffffff;
      --radius: 0.75rem;
    }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ───── Hero ───── */
    .hero {
      background: linear-gradient(135deg, #94c5fa 0%, #c4aff0 50%, #f0a0c8 100%);
      color: #0d1b3e;
      text-align: center;
      padding: 3.5rem 1rem 5rem;
      clip-path: ellipse(120% 100% at 50% 0%);
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      color: #0d1b3e;
    }

    .hero p {
      font-size: 1.15rem;
      opacity: 0.75;
      max-width: 560px;
      margin: 0 auto;
      color: #0d1b3e;
    }

    /* ───── Tab bar (Navigation) ───── */
    .tab-bar-wrap {
      display: flex;
      justify-content: center;
      margin-top: -2.5rem;
      position: relative;
      z-index: 10;
    }

    .tab-bar {
      background: var(--white);
      border-radius: 999px;
      padding: 0.35rem;
      display: inline-flex;
      gap: 0.25rem;
      box-shadow: 0 4px 24px rgba(230, 57, 70, 0.15);
      border: 1px solid var(--border);
    }

    .tab-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.6rem 1.6rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }

    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.35);
    }

    .tab-btn:hover:not(.active) {
      background: var(--primary-light);
      color: var(--primary);
    }

    .tab-btn.link-btn {
      background: transparent;
      color: #0d9488;
      border: 1.5px solid #0d9488;
    }

    .tab-btn.link-btn:hover {
      background: #ccfbf1;
      color: #0f766e;
      border-color: #0f766e;
    }

    /* ───── Main content ───── */
    main {
      max-width: 960px;
      margin: 2.5rem auto;
      padding: 0 1rem 4rem;
    }

    /* ───── Section heading (Summary) ───── */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin: 2.2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--primary-light);
      cursor: pointer;
      list-style: none; /* Hide default chevron */
      position: relative;
    }
    
    .section-heading::-webkit-details-marker {
      display: none;
    }

    .section-heading:hover {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .section-heading .icon {
      font-size: 1.4rem;
    }

    .section-heading .chevron {
      margin-left: auto;
      width: 20px;
      height: 20px;
      position: relative;
      transition: transform 0.3s ease;
      opacity: 0.6;
    }

    .section-heading .chevron::before,
    .section-heading .chevron::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 10px;
      height: 2px;
      background-color: currentColor;
      border-radius: 2px;
    }

    .section-heading .chevron::before {
      left: 0;
      transform: rotate(45deg);
    }

    .section-heading .chevron::after {
      right: 0;
      transform: rotate(-45deg);
    }

    details[open] .section-heading .chevron {
      transform: rotate(180deg);
    }
    
    /* ───── Cards grid ───── */

    /* ───── Cards grid ───── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.3rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(230, 57, 70, 0.14);
      border-color: var(--primary);
    }

    .card-emoji {
      font-size: 1.6rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15em 0.7em;
      border-radius: 999px;
      background: var(--primary-light);
      color: var(--primary-dark);
      margin-top: auto;
      align-self: flex-start;
    }

    /* External indicator */
    .card.external::after {
      content: '↗';
      position: absolute;
      top: 0.8rem;
      right: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      opacity: 0.5;
    }

    /* ───── Footer ───── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 960px;
      margin: 0 auto;
    }

    footer a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    footer a.tea {
      color: #e73c7e;
    }

    /* ───── Filter bar ───── */
    .filter-bar-wrap {
      display: flex;
      justify-content: center;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
      max-width: 960px;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filter-btn {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.4rem 1.1rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      background: var(--white);
      color: var(--muted);
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.25);
    }

    .filter-btn:hover:not(.active) {
      background: var(--primary-light);
      border-color: var(--primary-light);
      color: var(--primary);
    }

    @media (max-width: 500px) {
      .hero {
        padding: 2.5rem 1rem 4rem;
      }

      .tab-btn {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }

      .filter-bar-wrap {
        margin-top: 1rem;
        gap: 0.4rem;
      }

      .filter-btn {
        padding: 0.35rem 0.8rem;
        font-size: 0.8rem;
      }
    }

    /* ───── Search Box ───── */
    .search-wrap {
      max-width: 500px;
      margin: 2rem auto 0;
      padding: 0 1rem;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.8rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
      background: var(--white);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.1), 0 0 0 4px var(--primary-light);
    }

    .search-input::placeholder {
      color: #9ca3af;
    }

    .search-icon {
      position: absolute;
      left: 2.1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>💻 Computing Tools</h1>
    <p>Technical and programming tools for the classroom — from binary to algorithms.</p>
  </div>

  <!-- Navigation -->
  <div class="tab-bar-wrap">
    <div class="tab-bar" role="tablist">
      <a href="index.html" class="tab-btn">🎓 General Teaching</a>
      <a href="computing.html" class="tab-btn active">💻 Computing Tools</a>
      <a class="tab-btn link-btn" href="https://jamesabela.github.io/reading/apps.html">📚 English Tools</a>
      <a class="tab-btn link-btn" href="https://readysetcompute.com/">🚀
        ReadySetCompute</a>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" class="search-input" placeholder="Search for computing tools (e.g. binary, sort, python)..." oninput="handleSearch(this.value)">
  </div>

  <!-- Filter bar -->
  <div class="filter-bar-wrap">
    <button class="filter-btn active" onclick="filterByTag('all', this)">All</button>
    <button class="filter-btn" onclick="filterByTag('Primary', this)">Primary</button>
    <button class="filter-btn" onclick="filterByTag('KS1', this)">KS1</button>
    <button class="filter-btn" onclick="filterByTag('KS2', this)">KS2</button>
    <button class="filter-btn" onclick="filterByTag('KS3', this)">KS3</button>
    <button class="filter-btn" onclick="filterByTag('iGCSE', this)">iGCSE</button>
    <button class="filter-btn" onclick="filterByTag('A-Level', this)">A-Level</button>
  </div>

  <main>
    <div id="tools-container">
      <!-- Tools will be rendered here dynamically from computing.json -->
    </div>
  </main>

  <footer>
    <p>
      Made with ❤️ for better thinking. If it helped you, support the project.
      <a class="tea" href="https://wise.com/pay/me/jamesphilipj" target="_blank" rel="noopener">Buy me a tea</a>.
    </p>
    <p style="margin-top:0.5rem;font-size:0.85rem;">
      <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">CC BY-NC-SA 4.0</a> ©
      James Abela 2024
    </p>
  </footer>

  <script src="renderer.js"></script>
  <script>
    // Initialize the tools from computing.json
    window.addEventListener('DOMContentLoaded', () => {
      initTools('computing.json');
    });
  </script>

  <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt=""
      referrerpolicy="no-referrer-when-downgrade" /></noscript>
</body>

</html>
